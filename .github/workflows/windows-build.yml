name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build ProxyPass on Windows
    runs-on: windows-2022

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install ninja llvm -y
          vcpkg install openssl:x64-windows

      - name: Show compiler versions
        shell: pwsh
        run: |
          clang-cl --version
          cmake --version
          ninja --version

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Patch RakNet for clang-cl
        shell: pwsh
        run: |
          $raknetSrc = Get-ChildItem -Path build\_deps -Directory -Filter "raknet-src" -Recurse | Select-Object -First 1
          if (-not $raknetSrc) {
            Write-Error "raknet-src not found"
            exit 1
          }

          $gettimeofday = Join-Path $raknetSrc.FullName "Source\gettimeofday.h"
          if (Test-Path $gettimeofday) {
            $txt = Get-Content $gettimeofday -Raw
            $txt = $txt -replace '#include\s*<\s*time\.h\s*>', '#include <time.h>'
            Set-Content $gettimeofday $txt -NoNewline
            Write-Host "Patched $gettimeofday"
          }

          Get-ChildItem -Path build -Recurse -Filter flags.make | ForEach-Object {
            $txt = Get-Content $_.FullName -Raw
            $txt = $txt -replace '/WX', ''
            Set-Content $_.FullName $txt -NoNewline
          }

          Get-ChildItem -Path build -Recurse -Filter build.ninja | ForEach-Object {
            $txt = Get-Content $_.FullName -Raw
            $txt = $txt -replace '/WX', ''
            $txt = $txt -replace '-Werror', ''
            Set-Content $_.FullName $txt -NoNewline
          }

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build --parallel

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifact | Out-Null

          $exe = Get-ChildItem -Path . -Recurse -Filter ProxyPass.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "ProxyPass.exe not found"
            exit 1
          }
          Copy-Item $exe.FullName artifact\ProxyPass.exe -Force

          $vcpkgBin = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem $vcpkgBin -Filter *.dll | ForEach-Object {
              Copy-Item $_.FullName artifact\ -Force
            }
          }

          Get-ChildItem artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPass-windows-x64
          path: artifact/*
